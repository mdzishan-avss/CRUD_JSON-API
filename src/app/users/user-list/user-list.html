<div class="container p-4">

    <input class="form-control mb-3" placeholder="Search..." [(ngModel)]="searchText" (input)="onSearchChange()">

    <button class="btn btn-primary mb-3" (click)="toggleForm()">
        Add User
    </button>

    <!-- FORM -->
    <div *ngIf="showForm" class="mb-3">

        <input class="form-control mb-2" [(ngModel)]="name" placeholder="Name">
        <input class="form-control mb-2" [(ngModel)]="email" placeholder="Email">
        <input class="form-control mb-2" [(ngModel)]="password" placeholder="Password">

        <button class="btn btn-success" (click)="saveUser()">Save</button>
        <button class="btn btn-secondary" (click)="resetForm()">
            Cancel
        </button>
    </div>

    <!-- LOADING -->
    <div *ngIf="isLoading" class="text-center">
        Loading...
    </div>

    <!-- TABLE -->
    <div *ngIf="!isLoading">

        <table class="table table-bordered table-striped">

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr *ngIf="users.length === 0">
                    <td colspan="4" class="text-center">
                        No Users Found
                    </td>
                </tr>

                <tr *ngFor="let user of users">

                    <td>{{ user.name }}</td>

                    <td>{{ user.email }}</td>

                    <td>

                        <div class="form-check form-switch">

                            <input class="form-check-input" type="checkbox" [checked]="user.isActive"
                                (change)="toggleStatus(user)" />

                            <label class="form-check-label">
                                {{ user.isActive ? 'Active' : 'Inactive' }}
                            </label>

                        </div>

                    </td>

                    <td>

                        <button class="btn btn-primary btn-sm me-2" (click)="editUser(user)">
                            Edit
                        </button>

                        <button class="btn btn-danger btn-sm" (click)="deleteUser(user.id)">
                            Delete
                        </button>

                    </td>

                </tr>

            </tbody>

        </table>
        <!-- ================= PAGINATION UI ================= -->

        <div class="d-flex justify-content-center align-items-center mt-3 gap-3">

            <button class="btn btn-secondary" (click)="prevPage()" [disabled]="page === 1">
                Prev
            </button>

            <span class="fw-bold">
                Page {{ page }}
            </span>

            <button class="btn btn-secondary" (click)="nextPage()">
                Next
            </button>

        </div>

    </div>
